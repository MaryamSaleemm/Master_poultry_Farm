{% extends 'auth_base.html' %}

{% block content %}
<div class="login-box">
  <div class="card card-outline card-primary">
    <div class="card-header text-center">
      <a href="#" class="h1"><b>Master</b> <br><b>Poultry Farm</b></a>
    </div>
    <div class="card-body">

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <div class="row">
          <div class="col-12">
            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
          </div>
        </div>
      </form>
      
      <p class="mb-0 mt-3">
        <a href="{% url 'signup' %}" class="text-center">Don't have an account? <b>SignUp</b></a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
