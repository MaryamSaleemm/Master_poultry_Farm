<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Master Poultry Farm{% endblock %}</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; min-height: 100vh; }
        
        /* === SIDEBAR STYLING === */
        .sidebar {
            width: 250px;
            background-color: #2c3e50; /* Dark Blue/Grey */
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0; /* Prevents sidebar from shrinking on small screens */
        }
        
        

        .active-link {
            background-color: #4CAF50; /* Green for active item */
        }
        
        /* === MAIN CONTENT STYLING === */
        .content { 
            flex: 1; 
            padding: 30px; 
            background-color: #f4f4f4; 
            overflow-y: auto; /* Allows scrolling if content is long */
        }
    </style>
</head>
<body>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
