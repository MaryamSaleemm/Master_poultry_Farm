{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Poultry Farms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Lora:wght@500;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; color: #333; }
        h1, h2, h3, .navbar-brand { font-family: 'Lora', serif; }
        .hero-overlay { background: rgba(0, 0, 0, 0.5); }
        .img-cover { object-fit: cover; width: 100%; height: 100%; }
        .navbar-nav .nav-link { font-size: 0.95rem; font-weight: 500; letter-spacing: 0.5px; }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-white" href="{% url 'home' %}">
                 Master Poultry Farms
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link text-white mx-2" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-white mx-2" href="{% url 'about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link text-white mx-2" href="{% url 'facilities' %}">Facilities</a></li>
                    <li class="nav-item"><a class="nav-link text-white mx-2" href="{% url 'products' %}">Products</a></li>
                    <li class="nav-item"><a class="btn btn-warning text-dark fw-bold ms-3" href="{% url 'contact' %}">Contact Sales</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-black text-white py-4 mt-auto border-top border-warning border-3">
        <div class="container text-center">
            <p class="mb-0">© 2026 Master Poultry Farms</p>
            <small class="text-muted">Chichawatni, Chak 176/9L, Punjab.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
